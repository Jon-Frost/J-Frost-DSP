<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dashboard_name }} — DataForge Export</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="export-page">
    <h1>{{ dashboard_name }}</h1>
    <div class="export-subtitle">Exported from DataForge</div>
    <template id="chartsDataJson">{{ charts_json|safe }}</template>
    <div class="export-chart-grid" id="chartGrid"></div>
    <div class="export-footer">Generated by DataForge — Interactive Dashboard Builder</div>
    <script src="{{ url_for('static', filename='js/export.js') }}"></script>
</body>
</html>
