{% extends "base.html" %}
{% block title %}DataForge — Register{% endblock %}

{% block content %}
<!-- REGISTER PAGE — ACCOUNT CREATION FORM FOR NEW USERS -->
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-icon"><i class="fas fa-cube"></i></div>
            <h1>Create Account</h1>
            <p>Start building dashboards</p>
        </div>

        <form method="POST" action="/register">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
