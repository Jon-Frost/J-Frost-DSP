{% extends "base.html" %}
{% block title %}DataForge — Sign In{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-icon"><i class="fas fa-cube"></i></div>
            <h1>DataForge</h1>
            <p>Interactive dashboard builder</p>
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">
                <i class="fas fa-arrow-right"></i> Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
